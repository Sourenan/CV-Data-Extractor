[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: flake8-bugbear
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line too long — handled by formatter, not enforced as error
    "UP046",  # Generic[T] syntax is valid; Python 3.12 PEP 695 syntax is optional
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
